<div class="player-screen">
  <div class="player-top-card">
    <div class="player-info">
      <div class="player-label">Игрок</div>
      <div class="player-name">{{ playerName }}</div>
    </div>

    <div class="score-box">
      <div class="score-value">{{ score }}</div>
      <div class="score-label">очков</div>
    </div>
  </div>

  @if (errorMessage) {
    <div class="error-message">
      {{ errorMessage }}
    </div>
  }

  <div class="answer-zone">
    <button
      type="button"
      class="answer-button"
      [class.answer-button-disabled]="!canBuzz"
      [disabled]="!canBuzz"
      (click)="answer()"
    >
      ОТВЕТИТЬ
    </button>
  </div>

  <div class="player-status">
    {{ statusText }}
  </div>
</div>
