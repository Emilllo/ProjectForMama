<div class="join-page">
  <div class="join-card quiz-card quiz-card-glow">
    <h1>Присоединиться</h1>
    <p>Введите код комнаты и ваше имя</p>

    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }

    <div class="form-field">
      <label class="form-label">Код комнаты</label>
      <input
        class="input"
        [(ngModel)]="roomCode"
        placeholder="Введите код комнаты"
        maxlength="6"
        autocomplete="off"
      />
    </div>

    <div class="form-field">
      <label class="form-label">Имя игрока</label>
      <input
        class="input"
        [(ngModel)]="playerName"
        placeholder="Введите ваше имя"
        autocomplete="off"
        (keyup.enter)="joinGame()"
      />
    </div>

    <div class="join-actions">
      <button
        type="button"
        class="btn btn-primary"
        [disabled]="isLoading"
        (click)="joinGame()"
      >
        @if (isLoading) {
          Подключение...
        } @else {
          Войти
        }
      </button>

      <button
        type="button"
        class="btn btn-secondary"
        [disabled]="isLoading"
        (click)="goToHome()"
      >
        Назад
      </button>
    </div>
  </div>
</div>
