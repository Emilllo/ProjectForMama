<div class="join-page">
  <div class="join-card quiz-card quiz-card-glow">
    <h1>Присоединиться</h1>
    <p>Введите код комнаты и ваше имя</p>

    <div class="form-field">
      <label class="form-label">Код комнаты</label>
      <input
        class="input"
        
        placeholder="Введите код комнаты"
      />
    </div>

    <div class="form-field">
      <label class="form-label">Имя игрока</label>
      <input
        class="input"
        
        placeholder="Введите ваше имя"
      />
    </div>

    <div class="join-actions">
      <button
        type="button"
        class="btn btn-primary"
        
      >
        Войти
      </button>

      <button
        type="button"
        class="btn btn-secondary"
        (click)="goToHome()"
      >
        Назад
      </button>
    </div>
  </div>
</div>
